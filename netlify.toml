[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback: any route not matched by a static asset or a function
# is served index.html so client-side routing (React Router) handles it.
# This must stay LAST so it doesn't shadow /api/* or asset requests.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
